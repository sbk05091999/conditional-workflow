sudo vim .github/workflows/conditional-ci.yml

Add the required YAML workflow:

name: Conditional CI Pipeline

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run build
        run: echo "Building project..."

  test:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/feature/') && success()
    steps:
      - name: Run tests
        run: echo "Running tests on feature branch..."
Stage the file:

git add .github/workflows/conditional-ci.yml

Set Git identity if needed:

git config --global user.email "you@example.com"
git config --global user.name "Your Name"
Commit the workflow:

git commit -m "Add conditional CI workflow"
