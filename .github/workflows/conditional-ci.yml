name: CI Workflow

on:
  push:
    branches:
      - '**' 

jobs:
  # 1. The Build Job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Build application
        run: echo "Building..."

  # 2. The Test Job
  test:
    runs-on: ubuntu-latest
    
    # Requirement 5: Add Job Dependency Between Build -> Test
    needs: build 
    
    # Requirement 4: Add Correct Conditional Logic 
    # Ensures the job only runs on feature branches
    if: ${{ startsWith(github.ref, 'refs/heads/feature/') }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run tests
        run: echo "Running tests because this is a feature branch!"
